{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4">DuesPay Login</h3>
            
            <form method="POST">
                <div class="mb-3">
                    <label>Matric No</label>
                    <input type="text" name="matric_no" class="form-control form-control-lg" placeholder="e.g. CMP2201001" required>
                </div>
                
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                
                <button class="btn btn-primary w-100 btn-lg">Login</button>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
